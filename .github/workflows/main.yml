name: Build and Push Frontend

on:
  push:
    branches: [ "main", "master" ] # Agora ele aceita os dois nomes

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/grigs2/frontendreact/frontend:latest
          # Adiciona o argumento de memória para o Docker
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096